name: Refresh World Cup Data

on:
  schedule:
    - cron: "0 */6 * * *"   # toutes les 6 heures
  workflow_dispatch:         # bouton "Run workflow" manuel sur GitHub

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Recuperer les donnees API-Football
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python etl/fetch_api_football.py

      - name: Construire le schema en etoile
        run: python etl/build_star_schema.py api_football_players_stats.csv

      - name: Commit et push si changement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/*.csv data/raw/*.csv
          git diff --staged --quiet || git commit -m "Auto-refresh data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
