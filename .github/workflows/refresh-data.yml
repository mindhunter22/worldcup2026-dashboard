name: Refresh World Cup Data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Recuperer les donnees API-Football
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python etl/fetch_api_football.py

      - name: Construire le schema en etoile
        run: python etl/build_star_schema.py api_football_players_stats.csv

      - name: Commit et push si changement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/processed/*.csv data/raw/*.csv
          if git diff --staged --quiet; then
            echo "Aucun changement, pas de commit."
          else
            git commit -m "Auto-refresh data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi
